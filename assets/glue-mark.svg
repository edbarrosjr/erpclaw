<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" role="img" aria-label="Glue logo">
  <!-- Glue connector mark — brand teal, square lockup for light/dark backgrounds -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="#0d9488" opacity="0.12"/>
  <rect x="10" y="10" width="100" height="100" rx="24" stroke="#0d9488" stroke-width="5"/>
  <!-- two streams glued into one, moving forward -->
  <g fill="#0d9488"><circle cx="38" cy="44" r="7"/><circle cx="38" cy="76" r="7"/></g>
  <g stroke="#0d9488" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M38 44 L66 60"/><path d="M38 76 L66 60"/><path d="M60 60 L83 60"/>
  </g>
  <path d="M77 47 L98 60 L77 73 Z" fill="#14b8a6"/>
</svg>
